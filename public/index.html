<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silsilah Keluarga · Mbah Kromohardjo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-brand">
    <div class="header-ornament">✦</div>
    <h1><small>Silsilah Keluarga</small>Mbah Kromohardjo</h1>
  </div>
  <div class="header-actions">
    <button id="btn-add" class="btn btn--primary">＋ Tambah</button>
    <button id="btn-export" class="btn btn--ghost-light" title="Ekspor JSON">⬇ Ekspor</button>
    <button id="btn-reset"  class="btn btn--ghost-light" title="Reset data">↺ Reset</button>
    <button id="dark-toggle" class="btn-icon-round" title="Toggle dark mode">🌙</button>
  </div>
</header>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-card">
    <span class="stat-num" id="stat-total">—</span>
    <span class="stat-label">Anggota</span>
  </div>
  <div class="stat-card">
    <span class="stat-num" id="stat-alive">—</span>
    <span class="stat-label">Hidup</span>
  </div>
  <div class="stat-card stat-card--red">
    <span class="stat-num" id="stat-deceased">—</span>
    <span class="stat-label">Almarhum</span>
  </div>
  <div class="stat-card stat-card--green">
    <span class="stat-num" id="stat-married">—</span>
    <span class="stat-label">Menikah</span>
  </div>
  <div class="stat-card stat-card--blue">
    <span class="stat-num" id="stat-gens">—</span>
    <span class="stat-label">Generasi</span>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-group">
    <button class="btn btn--view active" id="btn-vtree">🌳 Visual Tree</button>
    <button class="btn btn--view" id="btn-ttree">☰ Outline</button>
    <button class="btn btn--view" id="btn-list">⊟ List</button>
  </div>

  <div class="toolbar-sep"></div>

  <!-- outline controls -->
  <div id="tree-controls" class="toolbar-group" style="display:none">
    <button class="btn btn--ghost btn--icon" id="btn-expand-all"   title="Buka semua">⊞</button>
    <button class="btn btn--ghost btn--icon" id="btn-collapse-all" title="Tutup semua">⊟</button>
  </div>

  <!-- visual tree zoom -->
  <div class="toolbar-group" id="zoom-controls">
    <button class="btn btn--ghost btn--icon" id="btn-zoom-in"    title="Zoom in">＋</button>
    <button class="btn btn--ghost btn--icon" id="btn-zoom-out"   title="Zoom out">－</button>
    <button class="btn btn--ghost btn--icon" id="btn-zoom-reset" title="Reset zoom">⊙</button>
  </div>

  <div class="toolbar-sep"></div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Cari nama, pasangan…">
  </div>

  <div class="toolbar-group" style="align-items:center;gap:6px;">
    <label class="filter-label">Parent:</label>
    <select id="filter-parent">
      <option value="__all__">Semua</option>
    </select>
  </div>
</div>

<!-- MAIN VIEWS -->
<div class="views-wrap">

  <!-- Visual tree -->
  <div id="view-vtree" class="view-panel">
    <div id="vtree-wrap" class="vtree-scroll"></div>
  </div>

  <!-- Text / outline tree -->
  <div id="view-ttree" class="view-panel" hidden>
    <div id="tree-root" class="tree-container"></div>
  </div>

  <!-- List -->
  <div id="view-list" class="view-panel" hidden>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nama</th><th>Gen</th><th>Orang Tua</th><th>Catatan</th>
          </tr>
        </thead>
        <tbody id="list-body"></tbody>
      </table>
      <div id="list-empty" hidden class="list-empty">Tidak ada anggota ditemukan.</div>
    </div>
  </div>

</div>

<!-- ══ MODALS ══════════════════════════════════ -->

<!-- Detail / Edit Modal -->
<div class="modal-overlay" id="detail-overlay">
  <div class="modal modal--detail">
    <button class="modal-x" id="dm-close">✕</button>
    <div class="modal-header">
      <h2 id="dm-title">Nama</h2>
      <p id="dm-subtitle" class="modal-subtitle"></p>
    </div>

    <!-- view mode -->
    <div id="dm-view"></div>

    <!-- edit form -->
    <div id="dm-edit-form" hidden class="modal-form">
      <div class="form-group"><label>Nama *</label><input type="text" id="de-name"></div>
      <div class="form-group"><label>Pasangan</label><input type="text" id="de-spouse"></div>
      <div class="form-row">
        <div class="form-group"><label>Generasi</label>
          <select id="de-gen">
            <option value="1">Gen I</option><option value="2">Gen II</option>
            <option value="3">Gen III</option><option value="4">Gen IV</option>
          </select>
        </div>
        <div class="form-group"><label>Orang Tua</label>
          <select id="de-parent"></select>
        </div>
      </div>
      <div class="form-group"><label>Catatan</label><textarea id="de-notes" rows="2"></textarea></div>
      <label class="check-row"><input type="checkbox" id="de-deceased"> Almarhum/Almarhumah</label>
    </div>

    <div class="modal-actions">
      <button class="btn btn--danger btn--sm" id="dm-delete-btn">🗑 Hapus</button>
      <div style="flex:1"></div>
      <button class="btn btn--secondary" id="dm-cancel-edit" hidden>Batal</button>
      <button class="btn btn--secondary" id="dm-edit-btn">✏ Edit</button>
      <button class="btn btn--primary" id="dm-save-btn" hidden>💾 Simpan</button>
    </div>
  </div>
</div>

<!-- Add Member Modal -->
<div class="modal-overlay" id="add-overlay">
  <div class="modal">
    <button class="modal-x" id="am-close">✕</button>
    <div class="modal-header">
      <h2>✚ Tambah Anggota</h2>
    </div>
    <div class="modal-form">
      <div class="form-group"><label>Nama *</label><input type="text" id="am-name" placeholder="Nama lengkap" autocomplete="off"></div>
      <div class="form-group"><label>Pasangan</label><input type="text" id="am-spouse" placeholder="Nama pasangan"></div>
      <div class="form-row">
        <div class="form-group"><label>Generasi</label>
          <select id="am-gen">
            <option value="1">Gen I</option><option value="2" selected>Gen II</option>
            <option value="3">Gen III</option><option value="4">Gen IV</option>
          </select>
        </div>
        <div class="form-group"><label>Orang Tua</label>
          <select id="am-parent"><option value="">— root —</option></select>
        </div>
      </div>
      <div class="form-group"><label>Catatan</label><textarea id="am-notes" rows="2" placeholder="Keterangan tambahan…"></textarea></div>
      <label class="check-row"><input type="checkbox" id="am-deceased"> Almarhum/Almarhumah</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn--secondary" id="am-cancel">Batal</button>
      <button class="btn btn--primary" id="am-save">💾 Simpan</button>
    </div>
  </div>
</div>

<!-- Confirm Delete -->
<div class="modal-overlay" id="confirm-overlay">
  <div class="modal" style="max-width:360px;">
    <h2 style="margin-bottom:12px;">Konfirmasi Hapus</h2>
    <p style="margin-bottom:6px;">Hapus <strong id="confirm-name"></strong>?</p>
    <p style="font-size:12px;color:var(--ink-3);">Anak-anaknya akan dipindahkan ke parent yang sama.</p>
    <div class="modal-actions" style="margin-top:16px;">
      <button class="btn btn--secondary" id="confirm-cancel">Batal</button>
      <button class="btn btn--danger" id="confirm-ok">Hapus</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
